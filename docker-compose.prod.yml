# Production override — bind layanan infra ke localhost VM saja.
# Port host (kanan) via .env; port container (kiri) tetap standar image.
#
# !reset pada `ports` wajib — tanpa ini Compose MENGGABUNGKAN port dari
# docker-compose.yml (5432, 6379, …) dan produksi, sehingga bentrok dengan
# postgres/redis lain di host VM.
#
# Usage:
#   docker compose --env-file .env -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Default host port: PostgreSQL 5435 | Redis 6380 | MinIO 9100/9200 | Grafana 3200

services:
  postgres:
    ports: !reset
      - "127.0.0.1:${POSTGRES_PUBLISH_PORT:-5435}:5432"

  pgadmin:
    ports: !reset
      - "127.0.0.1:${PGADMIN_PORT:-5050}:80"

  redis:
    ports: !reset
      - "127.0.0.1:${REDIS_PUBLISH_PORT:-6380}:6379"

  minio:
    ports: !reset
      - "127.0.0.1:${MINIO_API_PORT:-9100}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9200}:9001"

  prometheus:
    ports: !reset
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"

  grafana:
    ports: !reset
      - "127.0.0.1:${GRAFANA_PORT:-3200}:3000"

  loki:
    ports: !reset
      - "127.0.0.1:${LOKI_PORT:-3100}:3100"
