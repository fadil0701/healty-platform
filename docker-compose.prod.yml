# Production override — publish port infra ke host VM.
# Bind address: INFRA_BIND_HOST di .env (127.0.0.1 = SSH tunnel saja; 0.0.0.0 = LAN + firewall).
#
# !override pada `ports` wajib — tanpa ini Compose MENGGABUNGKAN port dari
# docker-compose.yml (5432, 6379, …) dan produksi, sehingga bentrok dengan
# postgres/redis lain di host VM.
#
# Usage:
#   docker compose --env-file .env -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Default host port: PostgreSQL 5435 | Redis 6380 | MinIO 9100/9200 | Grafana 3200
# Firewall LAN: ./scripts/configure-firewall-production.sh

services:
  postgres:
    ports: !override
      - "${INFRA_BIND_HOST:-127.0.0.1}:${POSTGRES_PUBLISH_PORT:-5435}:5432"

  pgadmin:
    ports: !override
      - "${INFRA_BIND_HOST:-127.0.0.1}:${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_CONFIG_SERVER_MODE: "True"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"

  redis:
    ports: !override
      - "${INFRA_BIND_HOST:-127.0.0.1}:${REDIS_PUBLISH_PORT:-6380}:6379"

  minio:
    ports: !override
      - "${INFRA_BIND_HOST:-127.0.0.1}:${MINIO_API_PORT:-9100}:9000"
      - "${INFRA_BIND_HOST:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9200}:9001"

  prometheus:
    ports: !override
      - "${INFRA_BIND_HOST:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"

  grafana:
    ports: !override
      - "${INFRA_BIND_HOST:-127.0.0.1}:${GRAFANA_PORT:-3200}:3000"

  loki:
    ports: !override
      - "${INFRA_BIND_HOST:-127.0.0.1}:${LOKI_PORT:-3100}:3100"
