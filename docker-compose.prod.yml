# Production override — bind layanan infra ke localhost VM saja.
# Usage:
#   docker compose --env-file .env -f docker-compose.yml -f docker-compose.prod.yml up -d
#   docker compose --env-file .env -f docker-compose.yml -f docker-compose.prod.yml --profile monitoring up -d

services:
  postgres:
    ports:
      - "127.0.0.1:${POSTGRES_PUBLISH_PORT:-5432}:5432"

  pgadmin:
    ports:
      - "127.0.0.1:${PGADMIN_PORT:-5050}:80"

  redis:
    ports:
      - "127.0.0.1:${REDIS_PUBLISH_PORT:-6379}:6379"

  minio:
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"

  prometheus:
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"

  grafana:
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"

  loki:
    ports:
      - "127.0.0.1:${LOKI_PORT:-3100}:3100"
